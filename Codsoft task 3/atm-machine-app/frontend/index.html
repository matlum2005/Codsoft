<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Machine Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="screen active">
            <div class="atm-container">
                <h1>🏧 Welcome to ATM</h1>
                <p>Enter your credentials</p>
                <div class="input-group">
                    <label>Account Number:</label>
                    <input type="text" id="loginAccount" placeholder="12345">
                </div>
                <div class="input-group">
                    <label>PIN:</label>
                    <input type="password" id="loginPin" placeholder="1234" maxlength="4">
                </div>
                <button id="loginBtn" class="btn login" data-original-text="Login 🔐">Login 🔐</button>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboardScreen" class="screen">
            <div class="atm-container">
                <h1>🏧 ATM Dashboard</h1>
                <div class="status-display">
                    <div id="balanceDisplay" class="status-item">Balance: $0.00</div>
                    <div id="lastTxDisplay" class="status-item">No transactions</div>
                    <button id="logoutBtn" class="btn logout">Logout 🚪</button>
                </div>
                <div class="input-group">
                    <label>Amount:</label>
                    <input type="number" id="amount" placeholder="$0.00" step="0.01" min="0">
                </div>
                <div class="buttons">
                    <button id="depositBtn" class="btn deposit" data-original-text="💰 Deposit">💰 Deposit</button>
                    <button id="withdrawBtn" class="btn withdraw" data-original-text="💸 Withdraw">💸 Withdraw</button>
                </div>
                <div id="message" class="message"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
