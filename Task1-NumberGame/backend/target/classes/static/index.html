<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Number Guessing Game</h1>
        <p class="subtitle">Guess the number between 1-100 (5 attempts)</p>
        
        <div class="game-info">
            <div class="attempts">Attempts left: <span id="attemptsLeft">5</span></div>
            <div class="status" id="status">ongoing</div>
        </div>
        
        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter your guess">
            <button id="submitBtn">Guess</button>
        </div>
        
        <div id="message" class="message"></div>
        
        <button id="newGameBtn" class="btn-secondary">New Game</button>
        
        <div class="scores-section">
            <h3>🏆 Top Scores</h3>
            <div id="scoresList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
